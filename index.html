<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Content Review</h2>

    <div class="character-display" id="characterDisplay">
        <img src="Character.png" alt="Survey Team Character">
    </div>

    <div id="loadingMsg" class="feedback-screen hidden">
        <div class="spinner"></div>
        <h3>Loading</h3>
        <p>Fetching your assigned content...</p>
    </div>

    <div id="loginSection">
        <div class="input-group">
            <label for="uidInput">
                In-game UID
                <span class="tooltip-icon" data-tooltip="The numeric user identification of your PUBG MOBILE account.">i</span>
            </label>
            <input type="text" id="uidInput" autocomplete="off" />
        </div>

        <div class="input-group">
            <label for="passwordInput">
                Password
                <span class="tooltip-icon" data-tooltip="The 4-digit password that you have been provided by the Survey Team Discord app.">i</span>
            </label>
            <input type="password" id="passwordInput" autocomplete="off" />
        </div>
        
        <button id="loginBtn" onclick="handleLogin()">Log In</button>
    </div>

    <div id="playerSection" class="hidden">
        <div class="status-wrapper">
            <div class="status-text">
                Reviewing <strong style="color: var(--text-main);"><span id="currentCount">0</span> of <span id="totalCount">0</span></strong>
            </div>
            <button id="refreshBtn" class="refresh-btn" onclick="fetchAssignedVideos(currentUid)" title="Check for new assignments">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Refresh
            </button>
        </div>
        
        <div class="fallback-link-container">
            Platform: <span id="platformLabel" style="font-weight:600; color:var(--text-main);">Content</span>
            <a id="directOpenLink" href="#" target="_blank">Open directly ↗</a>
        </div>

        <div class="video-container" id="videoContainer">
            <iframe id="videoFrame" src="" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>

        <div class="form-group">
            <label for="judgement">Judgement</label>
            <select id="judgement">
                <option value="">Select</option>
                <option value="Correct">Correct</option>
                <option value="Incorrect">Incorrect</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" placeholder="Feel free to add any additional context here."></textarea>
        </div>

        <button id="submitBtn" onclick="submitResult()">Submit (Enter)</button>
        
        <div class="form-group hidden" id="skipReasonSection">
            <label for="skipReason">Reason for Skipping</label>
            <select id="skipReason">
                <option value="">Select a reason</option>
                <option value="The video is not loading/working">The video is not loading/working</option>
                <option value="The video is unavailable in my region">The video is unavailable in my region</option>
            </select>
        </div>

        <button id="skipBtn" class="btn-secondary" onclick="skipResult()">Skip / Broken Link</button>
    </div>

    <div id="progressSection" class="feedback-screen hidden">
        <div class="spinner"></div>
        <h3>Saving Submission</h3>
        <p id="progressText">Logging reviews...</p>
        <p id="videosLeftText" class="videos-left"></p> 
    </div>

    <div id="finishedSection" class="feedback-screen hidden">
        <h3>Reviewed</h3>
        <p>There are no more pending videos assigned to you. Thank you for your participation!</p>
        <button class="refresh-btn" onclick="fetchAssignedVideos(currentUid)" style="margin-top: 24px; padding: 12px 24px; font-size: 1rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Check for New Assignments
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
