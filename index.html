<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Character.png" type="image/png">
</head>
<body>

<!-- Compact single-row status bar -->
<div id="topInfo" class="top-info-modal hidden">
    <span class="top-info-counter">
        <span id="currentCount">0</span><span class="top-info-sep">/</span><span id="totalCount">0</span>
    </span>
    <span class="top-info-divider"></span>
    <span id="etaDisplay" class="top-info-eta-inline">--</span>
    <button class="info-icon tooltip-icon" type="button" aria-label="ETA info" data-tooltip="The displayed time is an estimated completion time and may not be entirely accurate.">i</button>
    <button id="refreshBtn" class="refresh-btn top-refresh" onclick="fetchAssignedVideos(currentUid)" title="Check for new assignments">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
    </button>
</div>

<div id="progressBarContainer" class="progress-bar-container hidden">
    <div id="progressBarFill" class="progress-bar-fill"></div>
</div>

<div class="container">

    <button id="prevVideoBtn" class="prev-video-btn hidden" type="button" onclick="goToPreviousVideo()" aria-label="Previous video">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Previous
    </button>

    <div class="review-header-row">
        <h2>Content Review</h2>
        <div class="header-right">
            <a id="directOpenLink" href="#" target="_blank" class="direct-link-icon hidden" title="Open video directly">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            </a>
            <button id="logoutBtn" class="logout-btn hidden" type="button" onclick="handleLogout()" title="Log out">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Log out
            </button>
        </div>
    </div>

    <div class="character-display" id="characterDisplay">
        <img src="Character.png" alt="Survey Team Character">
    </div>

    <div id="loadingMsg" class="feedback-screen hidden">
        <div class="spinner"></div>
        <p class="feedback-label">Fetching your assigned content...</p>
    </div>

    <div id="loginSection">
        <div class="input-group">
            <label for="uidInput">
                In-game UID
                <span class="tooltip-icon" data-tooltip="The numeric user identification of your PUBG MOBILE account.">i</span>
            </label>
            <input type="text" id="uidInput" autocomplete="off" />
        </div>

        <div class="input-group">
            <label for="passwordInput">
                Password
                <span class="tooltip-icon" data-tooltip="The 4-digit password that you have been provided by the Survey Team Discord app.">i</span>
            </label>
            <input type="password" id="passwordInput" autocomplete="off" />
        </div>
        
        <div id="loginError" class="error-message hidden"></div>

        <button id="loginBtn" onclick="attemptLogin()">Log In</button>
    </div>

    <div id="playerSection" class="hidden">
        <div class="player-grid">
            <div class="video-container" id="videoContainer">
                <iframe id="videoFrame" src="" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media; fullscreen"></iframe>
                <div id="tiktokEmbedWrapper" class="tiktok-embed-wrapper"></div>
            </div>

            <div class="player-controls">
                <div class="form-group">
                    <label for="judgement">Judgement</label>
                    <select id="judgement">
                        <option value="">Select</option>
                        <option value="Correct">Correct</option>
                        <option value="Incorrect">Incorrect</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea id="notes" placeholder="Feel free to add any additional context here."></textarea>
                </div>

                <button id="submitBtn" onclick="submitResult()">Submit (Enter)</button>

                <div class="skip-area">
                    <button id="skipBtn" class="btn-skip-toggle" onclick="toggleSkip()">Skip / Broken Link</button>
                    <div class="form-group hidden" id="skipReasonSection">
                        <label for="skipReason">Reason for Skipping</label>
                        <select id="skipReason" onchange="onSkipReasonChange()">
                            <option value="">Select a reason</option>
                            <option value="The video is not loading">The video is not loading</option>
                            <option value="The video is unavailable in my region">The video is unavailable in my region</option>
                        </select>

                        <div id="skipDirectSuggest" class="skip-direct-suggest hidden">
                            <p class="skip-direct-label">Having trouble viewing it here? Try opening it directly.</p>
                            <a id="skipDirectBtn" href="#" target="_blank" rel="noreferrer noopener" class="skip-direct-link">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                </svg>
                                Open video directly
                            </a>
                        </div>

                        <button id="confirmSkipBtn" class="btn-secondary" style="margin-top:10px;" onclick="skipResult()">Confirm Skip</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Saving progress screen -->
    <div id="progressSection" class="feedback-screen hidden">
        <div class="spinner"></div>
        <p class="feedback-label" id="progressText">Saving submission...</p>
        <p id="videosLeftText" class="videos-left"></p>
    </div>

    <!-- Completion screen -->
    <div id="finishedSection" class="feedback-screen hidden">
        <div class="check-circle">
            <svg class="check-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
                <circle class="check-circle-bg" cx="26" cy="26" r="24" fill="none"/>
                <path class="check-tick" fill="none" d="M14 27l8 8 16-16"/>
            </svg>
        </div>
        <h3 class="finish-title">All done!</h3>
        <p class="finish-subtitle">You have reviewed all currently assigned content.</p>
        <p id="finishedStatLine" class="finish-stat"></p>
        <button class="btn-check-new" onclick="fetchAssignedVideos(currentUid)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Check for New Assignments
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
