<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #0f172a;        /* Deep sleek dark background */
            --card-bg: #ffffff;         /* Crisp white card for sharp contrast */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --link-color: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.025em;
        }

        .status-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        select, textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #f8fafc;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background-color: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            cursor: text;
        }

        .fallback-link-container {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
            background-color: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .fallback-link-container a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 600;
        }

        .fallback-link-container a:hover {
            text-decoration: underline;
        }

        .video-container {
            margin: 16px 0 24px 0;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        iframe {
            width: 100%;
            height: 450px; /* Increased height to better accommodate TikTok portrait orientation */
            border: none;
            display: block;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #loadingMsg {
            text-align: center;
            color: var(--primary);
            font-weight: 500;
            margin: 20px 0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .hidden {
            display: none !important;
        }

        #finishedSection {
            text-align: center;
            padding: 20px 0;
        }

        #finishedSection h3 {
            color: var(--success);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        #finishedSection p {
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Content Review</h2>

    <div id="loadingMsg">Loading configuration data...</div>

    <div class="form-group hidden" id="loginSection">
        <label for="usernameSelect">Select Profile</label>
        <select id="usernameSelect" onchange="startSession()">
            <option value="">Choose your name</option>
        </select>
    </div>

    <div id="playerSection" class="hidden">
        <div class="status-text">
            Reviewing item <strong style="color: var(--text-main);"><span id="currentCount">0</span> of <span id="totalCount">0</span></strong>
        </div>
        
        <div class="fallback-link-container">
            Platform: <span id="platformLabel" style="font-weight:600; text-transform:capitalize;">Content</span> | 
            <a id="directOpenLink" href="#" target="_blank">Open directly in new tab ↗</a>
        </div>

        <div class="video-container" id="videoContainer">
            <iframe id="videoFrame" src="" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>

        <div class="form-group">
            <label for="judgement">Judgement</label>
            <select id="judgement">
                <option value="">Select</option>
                <option value="Correct">Correct</option>
                <option value="Incorrect">Incorrect</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" placeholder="Feel free to add any additional context here."></textarea>
        </div>

        <button id="submitBtn" onclick="submitResult()">Submit Review</button>
    </div>

    <div id="finishedSection" class="hidden">
        <h3>All reviews completed</h3>
        <p>Thank you for your participation!</p>
    </div>
</div>

<script>
    // Embedded Deployed Google Apps Script Endpoint
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGakrByEE_KgzcUJCKvYC1kWOaVwg-ELlyLDCpx-avX32RZi8KPX4dVJeAprFVYSTHMQ/exec'; 
    
    let allDataMaster = [];
    let allAssignedVideos = []; 
    let currentIndex = 0;
    let currentUser = "";

    window.addEventListener('DOMContentLoaded', initializeApplication);

    async function initializeApplication() {
        const selectElement = document.getElementById("usernameSelect");
        const loadingMsg = document.getElementById("loadingMsg");
        const loginSection = document.getElementById("loginSection");

        try {
            const response = await fetch(APPS_SCRIPT_URL);
            allDataMaster = await response.json(); 
            
            const uniqueUsers = [...new Set(allDataMaster.map(item => item.username).filter(Boolean))];
            
            uniqueUsers.forEach(user => {
                const opt = document.createElement("option");
                opt.value = user;
                opt.textContent = user;
                selectElement.appendChild(opt);
            });

            loadingMsg.classList.add("hidden");
            loginSection.classList.remove("hidden");

        } catch (error) {
            console.error("Initialization error:", error);
            loadingMsg.innerText = "Error loading initialization matrix. Verify backend deployment configuration.";
            loadingMsg.style.color = "#ef4444";
        }
    }

    function startSession() {
        const selectElement = document.getElementById("usernameSelect");
        currentUser = selectElement.value;

        if (!currentUser) return; 

        allAssignedVideos = allDataMaster.filter(row => row.username === currentUser);

        if (allAssignedVideos.length > 0) {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("playerSection").classList.remove("hidden");
            document.getElementById("totalCount").innerText = allAssignedVideos.length;
            loadVideo(currentIndex);
        } else {
            alert("No data records are currently mapped to this user profile configuration.");
        }
    }

    function loadVideo(index) {
        document.getElementById("currentCount").innerText = index + 1;
        const videoData = allAssignedVideos[index];
        const iframe = document.getElementById("videoFrame");
        const directLink = document.getElementById("directOpenLink");
        const platformLabel = document.getElementById("platformLabel");

        let embedUrl = "";
        const rawUrl = (videoData.url || "").trim();
        const platform = (videoData.platform || "").toLowerCase().trim();

        // Update basic link attributes for easy reference
        directLink.href = rawUrl;
        platformLabel.textContent = platform || "Content";

        // 1. YouTube / YouTube Shorts Parsing Engine
        if (rawUrl.includes("youtu") || platform === "youtube") {
            const ytRegEx = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/shorts\/)([^#\&\?]*).*/;
            const match = rawUrl.match(ytRegEx);
            
            if (match && match[2].length === 11) {
                embedUrl = `https://www.youtube-nocookie.com/embed/${match[2]}`;
            } else {
                embedUrl = rawUrl;
            }

        // 2. Instagram Posts / Reels Parsing Engine
        } else if (platform === "instagram" || rawUrl.includes("instagram.com")) {
            let cleanUrl = rawUrl.split('?')[0]; 
            if (!cleanUrl.endsWith('/')) {
                cleanUrl += '/';
            }
            embedUrl = `${cleanUrl}embed`; 

        // 3. TikTok Video Parsing Engine
        } else if (platform === "tiktok" || rawUrl.includes("tiktok.com")) {
            // Extracts the structural numeric video ID string from standard TikTok patterns
            const tiktokRegEx = /\/video\/(\d+)/;
            const match = rawUrl.match(tiktokRegEx);
            
            if (match && match[1]) {
                embedUrl = `https://www.tiktok.com/embed/v2/${match[1]}`;
            } else {
                embedUrl = rawUrl; // Fallback directly to raw URL if identifier matching fails
            }

        // 4. Fallback default for unexpected links / other platform structures
        } else {
            embedUrl = rawUrl; 
        }

        iframe.src = embedUrl;
        document.getElementById("videoContainer").style.display = "block";
        
        document.getElementById("judgement").value = "";
        document.getElementById("notes").value = "";
    }

    async function submitResult() {
        const judgement = document.getElementById("judgement").value;
        const notes = document.getElementById("notes").value;
        const btn = document.getElementById("submitBtn");

        if (!judgement) {
            alert("Please select a valid judgement outcome before processing.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing submission...";

        const currentVideo = allAssignedVideos[currentIndex];

        const payload = {
            username: currentUser,
            url: currentVideo.url,
            platform: currentVideo.platform || "", 
            judgement: judgement,
            notes: notes
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            currentIndex++;

            if (currentIndex < allAssignedVideos.length) {
                loadVideo(currentIndex);
            } else {
                document.getElementById("playerSection").classList.add("hidden");
                document.getElementById("finishedSection").classList.remove("hidden");
            }

        } catch (error) {
            console.error("Transmission error:", error);
            alert("Submission save failed. Try processing again.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Review";
        }
    }
</script>

</body>
</html>
